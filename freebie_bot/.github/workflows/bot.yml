name: Freebie Bot Scheduler

on:
  schedule:
    # Запускается каждый час
    - cron: '0 * * * *'
  workflow_dispatch:
    # Позволяет запускать скрипт вручную по кнопке

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run bot script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py
      
    - name: Commit posted_ids.json
      # Этот шаг сохраняет ID опубликованных игр обратно в репозиторий, 
      # чтобы в следующий раз бот не запостил их снова.
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add posted_ids.json
        # Коммит произойдет только если файл изменился
        git commit -m "auto: update posted_ids.json [skip ci]" || echo "No changes to commit"
        git push
